name: Evidence Contracts CI

"on":
  push:
    branches:
      - master
      - main
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm ci

      - name: Spectral lint
        run: npx spectral lint openapi/evidence-ingestion.v1.yaml --ruleset tools/spectral.yaml --format pretty

      - name: Validate examples against schemas
        run: node scripts-js/validate-examples.js

      - name: Validate contract structure
        run: node tools/validate-contracts.js

  breaking-change-check:
    name: Breaking Change Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout base branch for comparison
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: _base

      - name: Install oasdiff
        run: |
          curl -sSfL https://raw.githubusercontent.com/tufin/oasdiff/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Check for breaking changes
        run: |
          oasdiff breaking \
            _base/openapi/evidence-ingestion.v1.yaml \
            openapi/evidence-ingestion.v1.yaml \
            --format text
        continue-on-error: false

  pack:
    name: Pack Artefact
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: |
          mkdir -p dist
          zip -r dist/consilium-evidence-contracts-${{ steps.version.outputs.version }}.zip \
            openapi/ schemas/ examples/ docs/ package.json

      - name: Upload packed artefact
        uses: actions/upload-artifact@v4
        with:
          name: evidence-contracts-${{ steps.version.outputs.version }}
          path: dist/*.zip
          retention-days: 30
